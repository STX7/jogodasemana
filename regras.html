<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regras de Participação - Jogo da Semana</title>
    <!-- Configuração de Tema Dinâmico (deve vir antes do Tailwind) -->
    <script src="js/theme.js"></script>
    <!-- Tailwind CSS CDN -->
    <script src="js/tailwind.js?v=1.0.1"></script>
    <!-- Font Awesome para Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Folhas de Estilo CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/regras.css">
</head>
<body class="bg-gray-950 text-gray-100 font-sans antialiased min-h-screen flex flex-col justify-between">

    <!-- CABEÇALHO INJETADO DINAMICAMENTE -->
    <div id="header-container"></div>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="max-w-6xl mx-auto px-4 w-full flex-grow mt-8 space-y-8 relative">
        
        <!-- SKELETON LOADER (aparece enquanto o conteúdo carrega) -->
        <div id="skeleton-loader" class="absolute inset-0 bg-gray-950 z-50 flex items-center justify-center rounded-lg">
            <div class="flex flex-col items-center gap-4">
                <div class="w-12 h-12 rounded-full border-4 border-gray-800 border-t-brand-500 animate-spin"></div>
                <p class="text-gray-500 text-sm font-medium">Carregando...</p>
            </div>
        </div>
        
        <!-- HERO / APRESENTAÇÃO -->
        <section class="group relative overflow-hidden bg-gradient-to-br from-gray-900 via-gray-900/95 to-brand-950/40 border border-gray-800/80 rounded-3xl p-6 sm:p-10 flex flex-col md:flex-row items-center justify-between gap-6 shadow-2xl">
            <div class="absolute inset-x-0 top-0 h-px bg-gradient-to-r from-transparent via-brand-500/40 to-transparent"></div>
            <div class="space-y-4 text-center md:text-left max-w-2xl">
                <span class="inline-flex items-center gap-2 bg-brand-950/70 text-brand-300 text-xs font-bold uppercase px-3 py-1 rounded-full border border-brand-800/60 tracking-wider shadow-sm shadow-brand-500/10">
                    <i class="fa-solid fa-scale-balanced text-[10px]"></i> Diretrizes Gerais
                </span>
                <h1 class="text-3xl sm:text-5xl font-black text-gray-100 leading-tight drop-shadow-sm">
                    As Regras Da <br class="hidden sm:inline"><span class="text-brand-300">Nossa Comunidade</span>
                </h1>
                <p class="text-sm text-gray-400 leading-relaxed max-w-xl">
                    Para garantir que todos aproveitem a experiência e que a rotação de jogos funcione de maneira justa, estabelecemos algumas diretrizes simples que todos devem seguir.
                </p>
            </div>
            <div class="hidden md:block shrink-0">
                <i class="fa-solid fa-scroll text-8xl text-brand-400/30 transition-transform duration-300 group-hover:scale-105"></i>
            </div>
        </section>

        <!-- GRID DE REGRAS INJETADO VIA MVC -->
        <section class="space-y-6">
            <h2 class="text-base font-bold uppercase tracking-wider text-gray-400 flex items-center gap-2">
                <i class="fa-solid fa-gavel text-brand-500"></i> Código de Conduta Gamer
            </h2>
            
            <div id="rules-container" class="grid grid-cols-1 md:grid-cols-2 gap-6 min-h-[150px]">
                <div class="col-span-full flex items-center justify-center h-40">
                    <i class="fa-solid fa-spinner animate-spin text-2xl text-brand-500"></i>
                </div>
            </div>
        </section>

    </main>

    <!-- RODAPÉ INJETADO DINAMICAMENTE -->
    <div id="footer-container"></div>

    <!-- SCRIPTS MVC EM ORDEM -->
    <script src="js/data.js"></script>
    <script src="js/model.js"></script>
    <script src="js/view.js"></script>
    <script src="js/controller.js"></script>

</body>
</html>
