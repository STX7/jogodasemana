<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regras de Participação - Jogo da Semana</title>
    <!-- Configuração de Tema Dinâmico (deve vir antes do Tailwind) -->
    <script src="js/theme.js"></script>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome para Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Folhas de Estilo CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/regras.css">
</head>
<body class="bg-gray-950 text-gray-100 font-sans antialiased min-h-screen flex flex-col justify-between">

    <!-- CABEÇALHO INJETADO DINAMICAMENTE -->
    <div id="header-container"></div>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="max-w-6xl mx-auto px-4 w-full flex-grow mt-8 space-y-8">
        
        <!-- HERO / APRESENTAÇÃO -->
        <section class="bg-gradient-to-r from-red-950/20 to-brand-950/20 border border-brand-800/10 rounded-3xl p-6 sm:p-10 flex flex-col md:flex-row items-center justify-between gap-6 shadow-2xl">
            <div class="space-y-4 text-center md:text-left max-w-2xl">
                <span class="bg-brand-950/60 text-brand-300 text-xs font-bold uppercase px-3 py-1 rounded-full border border-brand-700/50 tracking-wider">
                    <i class="fa-solid fa-scale-balanced mr-1"></i> Diretrizes Gerais
                </span>
                <h1 class="text-3xl sm:text-5xl font-black text-white leading-tight">
                    As Regras Da <br class="hidden sm:inline"><span class="text-brand-400">Nossa Comunidade</span>
                </h1>
                <p class="text-sm text-gray-400 leading-relaxed">
                    Para garantir que todos aproveitem a experiência e que a rotação de jogos funcione de maneira justa, estabelecemos algumas diretrizes simples que todos devem seguir.
                </p>
            </div>
            <div class="hidden md:block shrink-0">
                <i class="fa-solid fa-scroll text-8xl text-brand-500/30"></i>
            </div>
        </section>

        <!-- GRID DE REGRAS INJETADO VIA MVC -->
        <section class="space-y-6">
            <h2 class="text-base font-bold uppercase tracking-wider text-gray-400 flex items-center gap-2">
                <i class="fa-solid fa-gavel text-brand-500"></i> Código de Conduta Gamer
            </h2>
            
            <div id="rules-container" class="grid grid-cols-1 md:grid-cols-2 gap-6 min-h-[150px]">
                <div class="col-span-full flex items-center justify-center h-40">
                    <i class="fa-solid fa-spinner animate-spin text-2xl text-brand-500"></i>
                </div>
            </div>
        </section>

    </main>

    <!-- RODAPÉ INJETADO DINAMICAMENTE -->
    <div id="footer-container"></div>

    <!-- SCRIPTS MVC EM ORDEM -->
    <script src="js/data.js"></script>
    <script src="js/model.js"></script>
    <script src="js/view.js"></script>
    <script src="js/controller.js"></script>

</body>
</html>
