<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Semana - Registro de Jogos Semanais</title>
    <!-- Configuração de Tema Dinâmico (deve vir antes do Tailwind) -->
    <script src="js/theme.js"></script>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome para Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Folhas de Estilo CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/index.css">
</head>
<body class="bg-gray-950 text-gray-100 font-sans antialiased min-h-screen flex flex-col justify-between">

    <!-- CABEÇALHO INJETADO DYNAMICAMENTE VIA CONTROLLER/VIEW -->
    <div id="header-container"></div>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="max-w-6xl mx-auto px-4 w-full flex-grow mt-8 space-y-8">
        
        <!-- HERO / APRESENTAÇÃO -->
        <section class="bg-gradient-to-r from-brand-900/40 to-blue-900/20 border border-brand-800/30 rounded-3xl p-6 sm:p-10 flex flex-col md:flex-row items-center justify-between gap-6 shadow-2xl">
            <div class="space-y-4 text-center md:text-left max-w-2xl">
                <span class="bg-brand-900/80 text-brand-300 text-xs font-bold uppercase px-3 py-1 rounded-full border border-brand-700/50 tracking-wider">Histórico do Grupo</span>
                <h1 class="text-3xl sm:text-5xl font-black text-white leading-tight">
                    Nossos Jogos Jogados, <br class="hidden sm:inline"><span class="text-brand-400">Semana Após Semana</span>
                </h1>
                <p class="text-sm text-gray-400 leading-relaxed">
                    Acompanhe a lista de jogos escolhidos por nossa guilda gamer. Cada segunda-feira marca um novo desafio, avaliações honestas e memórias salvas em capturas e gameplays.
                </p>
            </div>
            <div class="hidden md:block shrink-0">
                <i class="fa-solid fa-gamepad text-8xl text-brand-500/30 animate-pulse"></i>
            </div>
        </section>

        <!-- CONTROLES: BUSCA E FILTROS -->
        <section class="bg-gray-900 border border-gray-800 rounded-2xl p-5 flex flex-col sm:flex-row items-center justify-between gap-4 shadow-lg">
            <!-- Barra de Busca -->
            <div class="relative w-full sm:max-w-md">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500">
                    <i class="fa-solid fa-magnifying-glass text-sm"></i>
                </span>
                <input 
                    type="text" 
                    id="search-input" 
                    placeholder="Pesquisar jogo ou quem escolheu..." 
                    class="w-full bg-gray-950 border border-gray-800 focus:border-brand-500 focus:ring-1 focus:ring-brand-500 text-sm text-white placeholder-gray-500 rounded-xl py-2.5 pl-10 pr-4 transition-all duration-300 outline-none"
                >
            </div>
            
            <!-- Ordenação -->
            <div class="flex items-center gap-2.5 w-full sm:w-auto justify-end">
                <label for="sort-select" class="text-xs text-gray-400 font-semibold whitespace-nowrap uppercase tracking-wider">
                    <i class="fa-solid fa-sort mr-1"></i> Ordenar por:
                </label>
                <select 
                    id="sort-select" 
                    class="bg-gray-950 border border-gray-800 focus:border-brand-500 text-sm text-white rounded-xl py-2 px-3 transition-all duration-300 outline-none cursor-pointer"
                >
                    <option value="mais_recente">Mais recente</option>
                    <option value="mais_antigo">Mais antigo</option>
                </select>
            </div>
        </section>

        <!-- SEÇÃO DE EXIBIÇÃO DA LISTA -->
        <section class="space-y-4">
            <h2 id="list-heading" class="text-base font-bold uppercase tracking-wider text-gray-400 flex items-center gap-2">
                <i class="fa-solid fa-list-ul text-brand-500"></i> Registro Geral
            </h2>
            
            <!-- Lista Simples Gerada Dinamicamente -->
            <div id="games-list" class="min-h-[200px]">
                <div class="flex items-center justify-center h-40">
                    <i class="fa-solid fa-spinner animate-spin text-2xl text-brand-500"></i>
                </div>
            </div>
            
            <!-- Controle de Paginação Dinâmico -->
            <div id="pagination-container" class="pt-4"></div>
        </section>

    </main>

    <!-- RODAPÉ INJETADO DINAMICAMENTE VIA CONTROLLER/VIEW -->
    <div id="footer-container"></div>

    <!-- SCRIPTS MVC EM ORDEM -->
    <script src="js/data.js"></script>
    <script src="js/model.js"></script>
    <script src="js/view.js"></script>
    <script src="js/controller.js"></script>

</body>
</html>
